name: Sync Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/NivinCNC/CNCVerse-Cloud-Stream-Extension.git
          git fetch upstream
          git merge upstream/master --allow-unrelated-histories -m "Sync upstream"
          git push origin master
