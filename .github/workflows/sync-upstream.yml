name: Sync Upstream

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/NivinCNC/CNCVerse-Cloud-Stream-Extension
          git fetch upstream
          git merge upstream/master --allow-unrelated-histories -X ours --no-edit || true
          
          # If merge left conflicts, resolve by keeping our versions
          git checkout --ours .github/workflows/build.yml 2>/dev/null || true
          git checkout --ours .github/workflows/sync-upstream.yml 2>/dev/null || true
          git add .github/workflows/build.yml .github/workflows/sync-upstream.yml 2>/dev/null || true
          
          # Complete merge if it was paused
          git diff --cached --quiet || git commit -m "Merge upstream (keep our workflows)" || true
