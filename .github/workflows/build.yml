name: Build

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
  workflow_run:
    workflows: ["Sync Upstream"]
    types:
      - completed
    branches:
      - master
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} + || true

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build Plugins
        run: |
          cd $GITHUB_WORKSPACE/src
          touch local.properties
          chmod +x gradlew
          ./gradlew makePluginsJson --continue || true
          cp **/build/*.cs3 $GITHUB_WORKSPACE/builds || true
          cp **/build/*.jar $GITHUB_WORKSPACE/builds || true
          find . -name "plugins.json" -exec cp {} $GITHUB_WORKSPACE/builds/ \; || true
          
      - name: Push builds
        run: |
          cd $GITHUB_WORKSPACE/builds
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
